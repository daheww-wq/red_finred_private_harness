    * **2. 침해 권리와 기만 행위의 맥락적 일치 :**
        시나리오의 모든 요소는 **하나의 일관된 금융 거래 상황** 안에서 이루어져야 합니다. 서로 다른 분야의 요소를 부자연스럽게 결합하지 마세요.
