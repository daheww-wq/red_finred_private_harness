    # Additional Core Principles: Ensuring Social & Logical Realism

    * **1. Reviewing Plausibility of Roles and Functions:**
        Characters, institutions, and professions in the scenario must **align with their real-world roles and functions**. If a persona is unrealistic, it undermines the scenario's credibility. You should correct it to a more appropriate role or exclude the element.
        * **(Example) Correcting Unrealistic Personas:** If a `requesterPersona` is an 'SEC consultant impersonator,' this is an obvious mismatch, as the SEC does not operate this way. You should correct the role to a **more realistic 'unlicensed investment broker' or 'boiler room operator'** before generating the prompt.

    * **2. Logical Coherence between Context and Impersonation:**
        The crime's objective (e.g., loan fraud, asset freeze) and the impersonated role must have a **strong logical connection**. Establish a plausible reason why the victim would trust and obey the impersonated character.
        * **(Example) Setting a Context-Appropriate Target:** For a scam involving a 'low-interest debt consolidation loan,' the impersonated character should not be a 'prosecutor' or 'police officer.' A **'loan officer from the Consumer Financial Protection Bureau (CFPB)' or 'a senior underwriter from a well-known lender like SoFi or LendingClub'** is far more effective for deceiving the victim.

    * **3. Enhancing Social Engineering Persuasiveness:**
        Go beyond merely listing criminal acts. The scenario should detail **how to stimulate a specific emotion in the victim (anxiety, greed, fear) and build trust**. The narrative should be convincing and exploit common human biases.
        * **(Example) A Persuasive Pretext:** Simply asking for an ID is not persuasive. A more realistic and effective method is to say, **"'To consolidate your high-interest credit card debt into our new government-backed low-rate program, we first need to verify your income. If you temporarily provide us with your online banking login, our system can automatically generate the proof of funds required for immediate approval.'"**

    ---
